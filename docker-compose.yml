services:
  hcc-spotify-bridge:
    build: .
    image: hcc-spotify-bridge:latest
    container_name: hcc-spotify-bridge
    restart: unless-stopped

    # host networking is required for Spotify Connect mDNS/zeroconf advertisement
    # to reach other devices on the LAN. Bridge networks won't propagate mDNS.
    network_mode: host

    # Pass through ALSA character devices so the container can write to /dev/snd
    devices:
      - /dev/snd:/dev/snd
      - /dev/cec0:/dev/cec0

    # The container's `node` user must be able to read/write the audio devices
    # AND the CEC device. /dev/cec0 is owned by root:video on the Pi. Both gids
    # are added as supplementary groups so the node user has access.
    group_add:
      - audio
      - video

    environment:
      - NODE_ENV=production
      - BRIDGE_PORT=3081
      - LIBRESPOT_NAME=NAD-AVR
      - LIBRESPOT_DEVICE=hdmi:CARD=vc4hdmi0,DEV=0
      - LIBRESPOT_DEVICE_TYPE=avr
      - LIBRESPOT_BITRATE=320
      - LIBRESPOT_FORMAT=S16
      - LIBRESPOT_INITIAL_VOLUME=100
      # Phone Spotify slider = digital attenuation of the Spotify stream only.
      # HCC app is the sole controller of NAD-AVR hardware volume via CEC.
      - LIBRESPOT_VOLUME_CTRL=softvol
      - CEC_DEVICE=/dev/cec0
      - CEC_TARGET_LA=5
      - CEC_VOLUME_SWAP=0
      - CEC_BRIDGE_VOLUME=off

    volumes:
      - hcc-spotify-data:/app/data
      # mDNS / Spotify Connect advertisement: librespot needs the host avahi
      # daemon (talked to over D-Bus). Without these mounts the container
      # cannot announce itself on the LAN and Spotify never sees it.
      - /var/run/avahi-daemon/socket:/var/run/avahi-daemon/socket
      - /var/run/dbus:/var/run/dbus

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  hcc-spotify-data:
    driver: local
